name: CI-CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          mkdir -p ~/.ssh

          python3 - <<'PY'
          import os
          import base64
          import binascii
          from pathlib import Path

          key = os.environ["EC2_KEY"].strip().replace("\\n", "\n").replace("\r", "")
          pem_markers = ("BEGIN OPENSSH PRIVATE KEY", "BEGIN RSA PRIVATE KEY", "BEGIN PRIVATE KEY")

          if not any(marker in key for marker in pem_markers):
            try:
              key = base64.b64decode(key, validate=True).decode("utf-8")
            except (binascii.Error, UnicodeDecodeError):
              raise SystemExit(
                "EC2_KEY must contain the EC2 private key, not the public key. "
                "Paste ~/.ssh/id_ed25519 (or a base64-encoded copy of it), not id_ed25519.pub."
              )

          if not any(marker in key for marker in pem_markers):
            raise SystemExit(
              "EC2_KEY did not decode to a valid private key. "
              "Verify the secret starts with BEGIN OPENSSH PRIVATE KEY or BEGIN PRIVATE KEY."
            )

          key_path = Path.home() / ".ssh" / "key.pem"
          key_path.write_text(key)
          key_path.chmod(0o600)
          PY

          ssh-keygen -y -f ~/.ssh/key.pem >/dev/null

          # prevent host prompt issues
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "=== Deployment started ==="

          cd /app/knitt

          echo "Pulling latest code..."
          git pull origin main

          echo "Building and restarting containers..."

          docker compose -f infra/docker-compose.prod.yaml up -d --build

          echo "Cleaning unused Docker resources..."
          docker system prune -f

          echo "=== Deployment successful ==="

          EOF
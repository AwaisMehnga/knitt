name: CI-CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          mkdir -p ~/.ssh

          # write private key safely
          echo "$EC2_KEY" | tr -d '\r' > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

          # verify key is valid (fails fast if corrupted)
          ssh-keygen -y -f ~/.ssh/key.pem > /dev/null

          # add EC2 host to known hosts
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo SSH connection successful"

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "=== Deployment started ==="

          cd ~/apps/knitt

          echo "Pulling latest code..."
          git pull origin main

          echo "Building and restarting containers..."
          docker compose -f infra/docker-compose.prod.yaml up -d --build

          echo "Cleaning unused Docker resources..."
          docker system prune -f

          echo "=== Deployment successful ==="

          EOF
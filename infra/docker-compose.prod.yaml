version: "3.9"

services:
  frontend:
    build: ../frontend
    container_name: frontend
    expose:
      - "5173"
    networks:
      - app-network

  backend:
    build: ../backend
    container_name: backend
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongo:27017/knitt
    expose:
      - "5000"
    depends_on:
      - mongo
    networks:
      - app-network

  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mehnga
      - MONGO_INITDB_ROOT_PASSWORD=AwaisKnitt5+2=7
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8085:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mehnga:AwaisKnitt5+2=7@mongo:27017/?authSource=admin
      - ME_CONFIG_BASICAUTH_USERNAME=mehnga
      - ME_CONFIG_BASICAUTH_PASSWORD=AwaisKnitt5+2=7
    depends_on:
      - mongo

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
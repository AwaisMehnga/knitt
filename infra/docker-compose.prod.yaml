version: "3.9"

services:
  frontend:
    build: ../frontend
    container_name: frontend
    expose:
      - "5173"
    networks:
      - app-network

  backend:
    build: ../backend
    container_name: backend
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/knitt
    expose:
      - "5000"
    depends_on:
      - mongo
    networks:
      - app-network

  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
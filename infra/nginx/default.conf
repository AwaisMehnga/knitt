server {
    listen 80;
    server_name theoryofautomata.com www.theoryofautomata.com;

    return 301 https://theoryofautomata.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.theoryofautomata.com;

    ssl_certificate     /etc/ssl/fullchain.pem;
    ssl_certificate_key /etc/ssl/privkey.pem;

    return 301 https://theoryofautomata.com$request_uri;
}

server {
    listen 443 ssl;
    server_name theoryofautomata.com;

    ssl_certificate     /etc/ssl/fullchain.pem;
    ssl_certificate_key /etc/ssl/privkey.pem;

    # SSL security (basic safe defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # FRONTEND
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # BACKEND API
    location /api/ {
        proxy_pass http://backend:5000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}